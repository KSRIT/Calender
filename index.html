<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แบบฟอร์มบันทึกนัดหมาย - งานกิจการนักเรียน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
    
    body { 
      font-family: 'Sarabun', sans-serif; 
      /* พื้นหลังไล่สีโทน ม่วงอ่อน ไป เหลืองอ่อน */
      background: linear-gradient(135deg, #f3e8ff 0%, #fef9c3 100%);
      min-height: 100vh;
    }

    .custom-input {
      transition: all 0.3s ease;
    }
    .custom-input:focus {
      transform: translateY(-2px);
      /* เงาตอนกดพิมพ์เป็นสีม่วง */
      box-shadow: 0 4px 6px -1px rgba(147, 51, 234, 0.15), 0 2px 4px -1px rgba(147, 51, 234, 0.1);
    }
    
    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(5px);
      display: none; justify-content: center; align-items: center; z-index: 50;
    }

    /* Animation สำหรับหน้า Success */
    .fade-in { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="flex items-center justify-center p-4 min-h-screen">

  <!-- Loading Screen -->
  <div id="loading" class="loading-overlay">
    <div class="text-center">
      <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-purple-600 mx-auto"></div>
      <p class="mt-4 text-gray-700 font-semibold text-lg animate-pulse">กำลังบันทึกข้อมูล...</p>
    </div>
  </div>

  <div class="w-full max-w-lg bg-white/85 backdrop-blur-md rounded-3xl shadow-xl overflow-hidden border border-purple-100">
    
    <!-- Header (โทนม่วง-เหลือง) -->
    <div class="bg-gradient-to-r from-purple-700 via-purple-600 to-yellow-500 p-6 text-center relative overflow-hidden">
      <!-- วงกลมตกแต่งฉากหลัง -->
      <div class="absolute top-0 left-0 w-32 h-32 bg-white opacity-10 rounded-full -translate-x-10 -translate-y-10"></div>
      <div class="absolute bottom-0 right-0 w-40 h-40 bg-yellow-300 opacity-20 rounded-full translate-x-12 translate-y-12"></div>
      
      <!-- ข้อความแทนโลโก้ -->
      <div class="relative z-10 mb-4 flex flex-col items-center justify-center">
        <div class="bg-white/20 backdrop-blur-sm px-6 py-3 rounded-2xl border border-white/30 shadow-sm transform hover:scale-105 transition-transform duration-300">
           <h1 class="text-xl md:text-2xl font-bold text-white drop-shadow-md tracking-wide">
             งานกิจการนักเรียน
           </h1>
           <h2 class="text-sm md:text-base font-semibold text-yellow-100 mt-1 drop-shadow-sm">
             โรงเรียนเมืองสุราษฎร์ธานี
           </h2>
        </div>
      </div>

      <h3 class="text-xl font-bold text-white mb-1 relative z-10 drop-shadow-sm flex items-center justify-center">
        <i class="far fa-calendar-check mr-2 text-yellow-300"></i> นัดหมายใหม่
      </h3>
      <p class="text-purple-100 text-sm font-medium relative z-10">ระบบบันทึกตารางงานออนไลน์</p>
    </div>

    <!-- Form Section -->
    <form id="eventForm" class="p-8 space-y-5" onsubmit="submitForm(event)">
      <!-- หัวข้อ -->
      <div class="group">
        <label class="block text-gray-700 text-sm font-semibold mb-2 ml-1">หัวข้อกิจกรรม</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <i class="fas fa-heading text-purple-400"></i>
          </div>
          <input class="custom-input w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-gray-800 focus:outline-none focus:ring-2 focus:ring-purple-300 focus:bg-white" 
                 id="title" name="title" type="text" placeholder="เช่น ประชุมทีม, ส่งงาน" required>
        </div>
      </div>

      <!-- Checkbox ตลอดทั้งวัน -->
      <div class="flex items-center ml-1">
        <input type="checkbox" id="allDay" class="w-5 h-5 text-purple-600 rounded focus:ring-purple-500 border-gray-300 cursor-pointer" onchange="toggleAllDay()">
        <label for="allDay" class="ml-2 text-sm font-semibold text-gray-700 cursor-pointer select-none">
          กิจกรรมตลอดทั้งวัน (All Day)
        </label>
      </div>

      <!-- วันเวลา -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="group">
          <label class="block text-gray-700 text-sm font-semibold mb-2 ml-1">เริ่ม</label>
          <div class="flex gap-2">
            <input class="custom-input w-3/5 px-2 sm:px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-gray-800 focus:outline-none focus:ring-2 focus:ring-purple-300 focus:bg-white" 
                   id="startDate" type="date" required>
            <input class="custom-input w-2/5 px-2 sm:px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-gray-800 focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:bg-white" 
                   id="startTime" type="time" required>
          </div>
        </div>
        <div class="group">
          <label class="block text-gray-700 text-sm font-semibold mb-2 ml-1">สิ้นสุด</label>
          <div class="flex gap-2">
            <input class="custom-input w-3/5 px-2 sm:px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-gray-800 focus:outline-none focus:ring-2 focus:ring-purple-300 focus:bg-white" 
                   id="endDate" type="date" required>
            <input class="custom-input w-2/5 px-2 sm:px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-gray-800 focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:bg-white" 
                   id="endTime" type="time" required>
          </div>
        </div>
      </div>

      <!-- สถานที่ -->
      <div class="group">
        <label class="block text-gray-700 text-sm font-semibold mb-2 ml-1">สถานที่</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <i class="fas fa-map-marker-alt text-purple-400"></i>
          </div>
          <input class="custom-input w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-gray-800 focus:outline-none focus:ring-2 focus:ring-purple-300 focus:bg-white" 
                 id="location" name="location" type="text" placeholder="ระบุสถานที่ (เช่น ห้องประชุม, ออนไลน์)">
        </div>
      </div>

      <!-- รายละเอียด -->
      <div class="group">
        <label class="block text-gray-700 text-sm font-semibold mb-2 ml-1">รายละเอียด</label>
        <textarea class="custom-input w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-gray-800 focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:bg-white" 
                  id="description" name="description" rows="3" placeholder="รายละเอียดเพิ่มเติม..."></textarea>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-yellow-500 hover:from-purple-700 hover:to-yellow-500 text-white font-bold py-4 rounded-2xl shadow-lg transform transition hover:-translate-y-1 hover:shadow-xl focus:ring-4 focus:ring-purple-300 active:scale-95 text-lg">
        <span class="flex items-center justify-center gap-2">
          <i class="fas fa-save"></i> บันทึกข้อมูล
        </span>
      </button>
    </form>

    <!-- Success View Section (Hidden by default) -->
    <div id="successView" class="hidden p-8 text-center fade-in">
      <div class="w-24 h-24 bg-gradient-to-br from-purple-100 to-yellow-100 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
        <i class="fas fa-check text-5xl text-purple-600"></i>
      </div>
      <h3 class="text-2xl font-bold text-gray-800 mb-2">บันทึกสำเร็จ!</h3>
      <p class="text-gray-600 mb-8">ข้อมูลของคุณถูกบันทึกลงในปฏิทินเรียบร้อยแล้ว</p>
      
      <div class="space-y-4">
        <a href="https://calendar.google.com/calendar/embed?src=sathit.ritin40%40gmail.com&ctz=Asia%2FBangkok" 
           target="_blank"
           class="flex items-center justify-center w-full bg-white border-2 border-purple-500 text-purple-700 font-bold py-3 rounded-2xl hover:bg-purple-50 transition duration-300 shadow-sm">
          <i class="far fa-calendar-alt mr-2 text-xl"></i> ดูปฏิทินกิจกรรม
        </a>
        
        <button onclick="resetAndShowForm()" 
                class="flex items-center justify-center w-full bg-gradient-to-r from-purple-600 to-yellow-500 text-white font-bold py-3 rounded-2xl hover:shadow-lg transition duration-300">
          <i class="fas fa-plus mr-2 text-xl"></i> เพิ่มรายการใหม่
        </button>
      </div>
    </div>

  </div>

  <div class="fixed bottom-4 text-center w-full text-purple-800/60 font-medium text-xs drop-shadow-sm">
    © Created by ICT PPW
  </div>

  <!-- SCRIPT -->
  <script>
    // =========================================================
    // URL Web App ของคุณ
    // =========================================================
    const APPS_SCRIPT_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzDlFJzPtv-OU8vJ05wRx3jIIOK176O_08RqRR9idoOpnhvfPv0z0E-Pck1F8Xwxlyy/exec";

    // === ส่วนจัดการ Logic หน้าเว็บ ===
    window.onload = function() {
      setDefaultDateTime();
    };

    function setDefaultDateTime() {
      const now = new Date();
      // จัดการกับ Timezone ให้ตรงกับเครื่องผู้ใช้
      const tzoffset = now.getTimezoneOffset() * 60000;
      
      const localNow = new Date(now - tzoffset);
      const startDateStr = localNow.toISOString().split('T')[0];
      const startTimeStr = localNow.toISOString().split('T')[1].slice(0, 5); 
      
      const oneHourLater = new Date(now.getTime() + 60*60*1000 - tzoffset);
      const endDateStr = oneHourLater.toISOString().split('T')[0];
      const endTimeStr = oneHourLater.toISOString().split('T')[1].slice(0, 5);

      document.getElementById('startDate').value = startDateStr;
      document.getElementById('endDate').value = endDateStr;
      document.getElementById('startTime').value = startTimeStr;
      document.getElementById('endTime').value = endTimeStr;
    }

    function toggleAllDay() {
      const isAllDay = document.getElementById('allDay').checked;
      const startTimeInput = document.getElementById('startTime');
      const endTimeInput = document.getElementById('endTime');
      
      if (isAllDay) {
        // ซ่อนช่องกรอกเวลาถ้าเลือกกิจกรรมตลอดทั้งวัน
        startTimeInput.classList.add('hidden');
        endTimeInput.classList.add('hidden');
        startTimeInput.required = false;
        endTimeInput.required = false;
      } else {
        // แสดงช่องกรอกเวลาตามปกติ
        startTimeInput.classList.remove('hidden');
        endTimeInput.classList.remove('hidden');
        startTimeInput.required = true;
        endTimeInput.required = true;
      }
      setDefaultDateTime();
    }

    // === ฟังก์ชันส่งข้อมูลด้วย fetch API ===
    function submitForm(e) {
      e.preventDefault();
      
      if (APPS_SCRIPT_WEB_APP_URL === "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE" || APPS_SCRIPT_WEB_APP_URL === "") {
          alert("กรุณาตั้งค่า APPS_SCRIPT_WEB_APP_URL ในโค้ดก่อนใช้งาน");
          return;
      }

      document.getElementById('loading').style.display = 'flex';
      
      const isAllDay = document.getElementById('allDay').checked;
      
      // รวมวันที่และเวลากลับเป็น format เดียวเพื่อส่งไป GS
      let startDateTime = document.getElementById('startDate').value;
      let endDateTime = document.getElementById('endDate').value;

      if (!isAllDay) {
        startDateTime += 'T' + document.getElementById('startTime').value;
        endDateTime += 'T' + document.getElementById('endTime').value;
      }

      const formData = {
        title: document.getElementById('title').value,
        startTime: startDateTime,
        endTime: endDateTime,
        location: document.getElementById('location').value,
        description: document.getElementById('description').value,
        isAllDay: isAllDay,
        fileData: null
      };

      if (!isAllDay && new Date(formData.endTime) <= new Date(formData.startTime)) {
         alert("⚠️ เวลาสิ้นสุดต้องอยู่หลังเวลาเริ่มต้น");
         document.getElementById('loading').style.display = 'none';
         return;
      }
      if (isAllDay && new Date(formData.endTime) < new Date(formData.startTime)) {
         alert("⚠️ วันที่สิ้นสุดต้องไม่อยู่ก่อนวันที่เริ่มต้น");
         document.getElementById('loading').style.display = 'none';
         return;
      }

      // ส่งข้อมูลด้วย fetch
      fetch(APPS_SCRIPT_WEB_APP_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8", 
        },
        body: JSON.stringify(formData)
      })
      .then(response => response.json())
      .then(data => onSuccess(data))
      .catch(error => onFailure(error));
    }

    function onSuccess(response) {
      document.getElementById('loading').style.display = 'none';
      if (response.success) {
        // ซ่อนฟอร์ม และแสดงหน้า Success
        document.getElementById('eventForm').classList.add('hidden');
        document.getElementById('successView').classList.remove('hidden');
      } else {
        alert("❌ " + response.message);
      }
    }

    function onFailure(error) {
      document.getElementById('loading').style.display = 'none';
      alert("❌ Error: ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้ (" + error.message + ")");
    }

    function resetAndShowForm() {
      document.getElementById('eventForm').reset();
      toggleAllDay(); // Reset state
      
      // สลับหน้ากลับมาแสดงฟอร์ม
      document.getElementById('successView').classList.add('hidden');
      document.getElementById('eventForm').classList.remove('hidden');
    }
  </script>
</body>
</html>
